<body>

    <iframe id="audio-player" 
            src="https://www.youtube.com/embed/BsBDB11nl1Y?enablejsapi=1&loop=1&playlist=BsBDB11nl1Y" 
            allow="autoplay">
    </iframe >

    <h1>Ты меня любишь? ❤️</h1>

    <div class="buttons">
        <a href="https://youtu.be/BsBDB11nl1Y" target="_blank" class="btn-yes">Да</a>
        
        <button id="btn-no">Нет</button>
    </div>

    <script>
        const noBtn = document.getElementById('btn-no');
        let player;

        // Подключаем YouTube API для управления звуком
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('audio-player', {
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            // Как только пользователь кликнет в любое место или на кнопку — музыка включится
            document.addEventListener('click', startMusic, { once: true });
            document.addEventListener('touchstart', startMusic, { once: true });
        }

        function startMusic() {
            if (player && typeof player.playVideo === 'function') {
                player.playVideo();
            }
        }

        // Загружаем скрипт YouTube API
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        // Логика убегания кнопки "Нет"
        function moveButton() {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 20) + 10;
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 20) + 10;
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        }

        noBtn.addEventListener('mouseenter', moveButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveButton();
        });
    </script>

</body>
